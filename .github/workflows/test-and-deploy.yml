##############################################################################
# LitterPic CI/CD Pipeline
#
# Trigger: push to master  → deploys to Vercel automatically
#
# E2E tests are run locally from the IDE only (not part of this pipeline).
#
# Required GitHub Secrets  (Settings → Secrets and variables → Actions):
#
#   ── Vercel deployment ──────────────────────────────────────────────────────
#   VERCEL_TOKEN                    Vercel personal access token
#   VERCEL_ORG_ID                   Vercel team/org ID  (.vercel/project.json)
#   VERCEL_PROJECT_ID               Vercel project ID   (.vercel/project.json)
#
##############################################################################

name: Deploy

on:
  push:
    branches: [master]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Deploy to Vercel Production on every push to master
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
