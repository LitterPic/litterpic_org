##############################################################################
# LitterPic CI/CD Pipeline
#
# Trigger: push to master
#
# Jobs:
#   1. test   — build Next.js, run Playwright E2E tests
#   2. deploy — deploy to Vercel ONLY if tests pass (needs: test)
#
# Required GitHub Secrets:
#   VERCEL_TOKEN          - Vercel personal access token
#   VERCEL_ORG_ID         - Vercel team/org ID (from .vercel/project.json)
#   VERCEL_PROJECT_ID     - Vercel project ID   (from .vercel/project.json)
#   TEST_USER_EMAIL       - Verified Firebase test account email
#   TEST_USER_PASSWORD    - Its password
#
#   All NEXT_PUBLIC_* variables (Firebase, GA, Maps key, AWS, etc.) must also
#   be added as secrets so `next build` succeeds in CI:
#   NEXT_PUBLIC_FIREBASE_API_KEY
#   NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID
#   NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#   NEXT_PUBLIC_FIREBASE_APP_ID
#   NEXT_PUBLIC_GA_MEASUREMENT_ID
#   NEXT_PUBLIC_PLACES_API_KEY
#   NEXT_PUBLIC_AWS_ACCESS_KEY_ID
#   NEXT_PUBLIC_AWS_SECRET_ACCESS_KEY
#   NEXT_PUBLIC_AWS_REGION
#   FIREBASE_API_KEY
#   FIREBASE_PROJECT_ID
#   MAILERSEND_API_KEY
#   MAILERSEND_FROM_EMAIL
#   (add any other vars from your .env.local)
##############################################################################

name: Test → Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Run E2E Tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      # Firebase / app config — passed from GitHub Secrets
      NEXT_PUBLIC_FIREBASE_API_KEY:              ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:          ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID:           ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:       ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID:               ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID:             ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      NEXT_PUBLIC_PLACES_API_KEY:                ${{ secrets.NEXT_PUBLIC_PLACES_API_KEY }}
      NEXT_PUBLIC_AWS_ACCESS_KEY_ID:             ${{ secrets.NEXT_PUBLIC_AWS_ACCESS_KEY_ID }}
      NEXT_PUBLIC_AWS_SECRET_ACCESS_KEY:         ${{ secrets.NEXT_PUBLIC_AWS_SECRET_ACCESS_KEY }}
      NEXT_PUBLIC_AWS_REGION:                    ${{ secrets.NEXT_PUBLIC_AWS_REGION }}
      FIREBASE_API_KEY:                          ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_PROJECT_ID:                       ${{ secrets.FIREBASE_PROJECT_ID }}
      MAILERSEND_API_KEY:                        ${{ secrets.MAILERSEND_API_KEY }}
      MAILERSEND_FROM_EMAIL:                     ${{ secrets.MAILERSEND_FROM_EMAIL }}
      # Test credentials
      TEST_USER_EMAIL:      ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD:   ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Build Next.js (production)
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Vercel Production
  # Only runs on push to master AND only when tests pass
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test  # ← Gates deployment on passing tests
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    env:
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

